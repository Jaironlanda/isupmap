<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>IsUp — Service Status Heatmap</title>
		<meta name="description" content="Live up/down heatmap for popular services." />
		<link rel="icon" id="favicon" href="data:," />
		<link rel="stylesheet" href="/styles.css" />
	</head>
	<body>
		<header class="header">
			<div class="header__title">
				<h1>IsUp</h1>
				<span class="header__subtitle">Live service status heatmap</span>
			</div>
			<div class="header__meta">
				<span id="updated" class="updated">Loading…</span>
				<ul class="legend" aria-label="Status legend">
					<li><span class="swatch is-up"></span>Up</li>
					<li><span class="swatch is-degraded"></span>Degraded</li>
					<li><span class="swatch is-down"></span>Down</li>
					<li><span class="swatch is-unknown"></span>Unknown</li>
				</ul>
				<div class="toolbar">
					<button id="themeBtn" class="tbar-btn tbar-btn--icon" type="button" title="Toggle theme">☀️</button>
					<button id="searchBtn" class="tbar-btn" type="button" aria-haspopup="dialog" title="Search (⌘K)">
						Search <span class="kbd">⌘K</span>
					</button>
					<button id="problemsBtn" class="tbar-btn" type="button" aria-pressed="false">Problems only</button>
					<button id="customizeBtn" class="tbar-btn" type="button" aria-expanded="false" aria-controls="customizePanel">Customize</button>
					<button id="incidentsBtn" class="tbar-btn" type="button" aria-expanded="false" aria-controls="incidentsPanel">Incidents</button>
				</div>
			</div>
		</header>

		<main id="grid" class="grid" aria-live="polite">
			<p class="grid__loading">Fetching service status…</p>
		</main>

		<aside id="incidentsPanel" class="panel" aria-label="Recent incidents" hidden>
			<div class="panel__head">
				<h2>Recent incidents</h2>
				<button id="incidentsClose" class="panel__close" type="button" aria-label="Close">×</button>
			</div>
			<div id="incidentsList" class="panel__list"></div>
		</aside>

		<aside id="customizePanel" class="panel" aria-label="Customize services" hidden>
			<div class="panel__head">
				<h2>Customize</h2>
				<button id="customizeClose" class="panel__close" type="button" aria-label="Close">×</button>
			</div>
			<div class="panel__sub">
				<span id="customizeCount"></span>
				<button id="customizeReset" class="link-btn" type="button">Reset</button>
			</div>
			<label class="cz-toggle">
				<input id="notifyToggle" type="checkbox" />
				<span>🔔 Desktop notifications on status changes</span>
			</label>
			<div id="customizeList" class="panel__list"></div>
		</aside>

		<div id="palette" class="palette" hidden>
			<div class="palette__box" role="dialog" aria-label="Command palette">
				<input
					id="paletteInput"
					class="palette__input"
					type="text"
					placeholder="Search services or run a command…"
					autocomplete="off"
					spellcheck="false"
					aria-label="Search services or run a command"
				/>
				<ul id="paletteResults" class="palette__results" role="listbox"></ul>
			</div>
		</div>

		<div id="detail" class="modal" hidden>
			<div class="modal__box" role="dialog" aria-modal="true" aria-label="Service detail">
				<button class="modal__close" type="button" data-close aria-label="Close">×</button>
				<div id="detailBody" class="modal__body"></div>
			</div>
		</div>

		<div id="tooltip" class="tooltip" role="tooltip" hidden></div>

		<div id="toasts" class="toasts" aria-live="assertive" aria-atomic="false"></div>

		<script src="/app.js" type="module"></script>
	</body>
</html>
