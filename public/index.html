<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<title>isUpMap — Service Status</title>
		<meta name="description" content="Real-time up/down status heatmap for 60+ popular internet services. See which services are up, degraded, or down — right now." />
		<link rel="canonical" href="https://isupmap.com/" />
		<meta name="robots" content="index, follow" />
		<meta name="theme-color" content="#0f1117" />

		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://isupmap.com/" />
		<meta property="og:title" content="isUpMap — Service Status" />
		<meta property="og:description" content="Real-time up/down status heatmap for 60+ popular internet services. See which services are up, degraded, or down — right now." />
		<meta property="og:site_name" content="isUpMap" />
		<meta property="og:image" content="https://isupmap.com/images/og-map.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:image:alt" content="isUpMap live service status heatmap showing AWS, GitHub, OpenAI, Cloudflare and more" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="isUpMap — Service Status" />
		<meta name="twitter:description" content="Real-time up/down status heatmap for 60+ popular internet services." />
		<meta name="twitter:url" content="https://isupmap.com/" />
		<meta name="twitter:image" content="https://isupmap.com/images/og-map.png" />
		<meta name="twitter:image:alt" content="isUpMap live service status heatmap showing AWS, GitHub, OpenAI, Cloudflare and more" />

		<link rel="icon" id="favicon" href="data:," />
		<link rel="stylesheet" href="/styles.css" />
		<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
		<script src="/analytics.js" type="module"></script>
	</head>
	<body>
		<div id="domainBanner" class="domain-banner" hidden>
			We've moved! The official domain is now
			<a href="https://isupmap.com" class="domain-banner__link">isUpMap.com</a>.
			<button class="domain-banner__close" type="button" aria-label="Dismiss">×</button>
		</div>
		<script>
			(function () {
				if (location.hostname === 'map.warmindex.com') {
					var b = document.getElementById('domainBanner');
					b.hidden = false;
					b.querySelector('.domain-banner__close').addEventListener('click', function () { b.hidden = true; });
				}
			})();
		</script>

		<header class="header">
			<div class="header__brand">
				<h1 class="header__logo">isUpMap</h1>
			</div>
			<button id="searchBtn" class="header__search" type="button" aria-haspopup="dialog" title="Search (⌘K)">
				<i data-lucide="search"></i>
				<span class="header__search-placeholder">Search services or run a command…</span>
				<span class="kbd">⌘K</span>
			</button>
			<div class="toolbar">
				<button id="problemsBtn" class="tbar-btn tbar-btn--icon" type="button" aria-pressed="false" title="Problems only">
					<i data-lucide="alert-triangle"></i>
					<span id="problemsCount" class="tbar-badge" hidden>0</span>
				</button>
				<button id="customizeBtn" class="tbar-btn tbar-btn--icon" type="button" aria-expanded="false" aria-controls="customizePanel" title="Customize">
					<i data-lucide="sliders-horizontal"></i>
				</button>
				<button id="incidentsBtn" class="tbar-btn tbar-btn--icon" type="button" aria-expanded="false" aria-controls="incidentsPanel" title="Incidents">
					<i data-lucide="activity"></i>
				</button>
				<button id="themeBtn" class="tbar-btn tbar-btn--icon" type="button" title="Toggle theme">
					<i data-lucide="sun"></i>
				</button>
			</div>
		</header>
		<div class="statusbar">
			<ul class="legend" aria-label="Status legend">
				<li><span class="swatch is-up"></span>Up</li>
				<li><span class="swatch is-degraded"></span>Degraded</li>
				<li><span class="swatch is-down"></span>Down</li>
				<li><span class="swatch is-unknown"></span>Unknown</li>
			</ul>
			<span id="updated" class="updated">Loading…</span>
		</div>

		<main id="grid" class="grid" aria-live="polite">
			<p class="grid__loading">Fetching service status…</p>
		</main>

		<aside id="incidentsPanel" class="panel" aria-label="Recent incidents" hidden>
			<div class="panel__head">
				<h2>Recent incidents</h2>
				<button id="incidentsClose" class="panel__close" type="button" aria-label="Close">×</button>
			</div>
			<div id="incidentsList" class="panel__list"></div>
		</aside>

		<aside id="customizePanel" class="panel" aria-label="Customize services" hidden>
			<div class="panel__head">
				<h2>Customize</h2>
				<button id="customizeClose" class="panel__close" type="button" aria-label="Close">×</button>
			</div>
			<div class="panel__sub">
				<span id="customizeCount"></span>
				<button id="customizeReset" class="link-btn" type="button">Reset</button>
			</div>
			<label class="cz-toggle">
				<input id="notifyToggle" type="checkbox" />
				<span>🔔 Desktop notifications on status changes</span>
			</label>
			<div id="customizeList" class="panel__list"></div>
		</aside>

		<div id="palette" class="palette" hidden>
			<div class="palette__box" role="dialog" aria-label="Command palette">
				<input
					id="paletteInput"
					class="palette__input"
					type="text"
					placeholder="Search services or run a command…"
					autocomplete="off"
					spellcheck="false"
					aria-label="Search services or run a command"
				/>
				<ul id="paletteResults" class="palette__results" role="listbox"></ul>
			</div>
		</div>

		<div id="detail" class="modal" hidden>
			<div class="modal__box" role="dialog" aria-modal="true" aria-label="Service detail">
				<button class="modal__close" type="button" data-close aria-label="Close"><i data-lucide="x"></i></button>
				<div id="detailBody" class="modal__body"></div>
			</div>
		</div>

		<div id="tooltip" class="tooltip" role="tooltip" hidden></div>

		<div id="toasts" class="toasts" aria-live="assertive" aria-atomic="false"></div>

		<script src="/app.js" type="module"></script>
	</body>
</html>
