name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Regenerate binding types so the typecheck matches wrangler.jsonc.
      - run: npm run types

      - run: npm run typecheck

      - run: npm test
